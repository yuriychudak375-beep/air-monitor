<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Air Monitor — Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body.dark { background: #050608; color: #eee; }
    body.light { background: #f2f2f2; color: #111; }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #adminBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #2d6cff;
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: 0.15s;
     }
#adminBtn:hover {
  background: #1b4ed6;
}

body.light #adminBtn {
  background: #222;
  color: #fff;
}
body.light #adminBtn:hover {
  background: #000;
}
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      backdrop-filter: blur(6px);
    }
    body.light #hud {
      background: rgba(255,255,255,0.8);
      color: #111;
    }
    #clock {
      font-weight: 600;
      margin-bottom: 4px;
    }
    #themeToggle {
      border: none;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #2d6cff;
      color: #fff;
    }
    body.light #themeToggle {
      background: #222;
      color: #fff;
    }

    #legend {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      backdrop-filter: blur(6px);
    }
    body.light #legend {
      background: rgba(255,255,255,0.8);
      color: #111;
    }
    #legend-box {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      border-radius: 3px;
      background: #ff3333;
      box-shadow: 0 0 8px rgba(255,0,0,0.9);
    }
    /* Стилі для кнопки та панелі новин */
    #newsBtn {
      position: fixed;
      top: 50px; 
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #0088cc; 
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: 0.15s;
    }
    #newsBtn:hover { background: #0077b5; }

    #newsSidebar {
      position: fixed;
      top: 0;
      right: -350px;
      width: 320px;
      height: 100%;
      background: rgba(20, 22, 26, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
      z-index: 2000;
      transition: 0.3s;
      padding: 20px;
      display: flex;
      flex-direction: column;
      color: #eee;
    }
    body.light #newsSidebar {
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      border-left: 1px solid #ddd;
    }
    #newsSidebar.active { right: 0; }
    
    .msg-item {
      border-bottom: 1px solid #444;
      padding: 10px 0;
      font-size: 14px;
    }
    body.light .msg-item { border-bottom: 1px solid #ddd; }
    .msg-date { color: #888; font-size: 11px; margin-bottom: 4px; }
    .channel-link { color: #0088cc; text-decoration: none; font-weight: bold; }
    /* Стиль для відображення часу початку тривоги */
    .alarm-time-label {
      background: rgba(0, 0, 0, 0.7) !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      color: #fff !important;
      font-size: 10px !important;
      font-weight: bold !important;
      padding: 2px 4px !important;
      border-radius: 4px !important;
      box-shadow: none !important;
    }
    /* Стиль для підписів аеродромів */
    .base-label {
      background: none !important;
      border: none !important;
      color: #ffea00 !important;
      font-weight: bold !important;
      text-shadow: 1px 1px 2px #000;
      box-shadow: none !important;
    }
  </style>
</head>
<body class="dark">
  <div id="map"></div>
  
  <div id="adminBtn">Адмін</div>

  <button id="newsBtn">Новини ШРБ</button>

  <div id="newsSidebar">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">Стрічка <a href="https://t.me/shrbua" target="_blank" class="channel-link">ШРБ</a></h3>
        <button id="closeNews" style="background:none; border:none; color:inherit; cursor:pointer; font-size: 20px;">✕</button>
    </div>
    <div id="messagesList" style="overflow-y: auto; flex-grow: 1; margin-top: 15px;">
        Завантажте повідомлення за 24г.
    </div>
    <button id="refreshNews" style="margin-top: 10px; padding: 10px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
        Оновити за 24г
    </button>
  </div>
  
  <div id="hud">
    <div id="clock">--:--:--</div>
    <button id="themeToggle">Світла тема</button>
  </div>

  <div id="legend">
    <span id="legend-box"></span>
    Активна повітряна тривога (район)
  </div>

  <div id="app-version" style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: gray; opacity: 0.7;">
    v1.3.0
  </div>
  
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    
    document.getElementById("adminBtn").onclick = () => {
    location.href = "/admin-login.html";
   };
    const map = L.map("map").setView([49, 31], 6);

    // Список авіабаз та пускових районів
    const militaryBases = [
    { name: "Оленья (Ту-95МС/22м3)", lat: 68.15, lon: 33.30, icon: "🛫", details: "до 1 борта Ту-95мс, ~35 бортів Ту-22м3", lastActivity: "Не зафіксована активність" },
    { name: "Енгельс-2 (Ту-160/95)", lat: 51.48, lon: 46.21, icon: "🛫", details: "2-3 борта Ту-95мс, до 1 борта Ту-160", lastActivity: "Не зафіксована активність" },
    { name: "Шайковка (Ту-22М3)", lat: 54.22, lon: 34.36, icon: "🛫", details: "Очікування даних", lastActivity: "Не зафіксована активність" },
    { name: "Приморсько-Ахтарськ (Шахеди)", lat: 46.03, lon: 38.24, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Відмічений запуск о 19:59, 7 груп" },
    { name: "Халіно (Шахеди)", lat: 51.75, lon: 36.14, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Міллерово (Шахеди)", lat: 48.95, lon: 40.29, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Відмічено запуск о 22:59, 12 груп" },
    { name: "Навля (Шахеди)", lat: 52.87, lon: 34.59, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Шаталово (Шахеди)", lat: 54.34, lon: 32.47, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Цимбулова (Шахеди)", lat: 53.37, lon: 35.82, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Гвардійське (Шахеди)", lat: 45.11, lon: 33.97, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Кача (Шахеди)", lat: 44.77, lon: 33.57, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Чауда (Шахеди)", lat: 45.00, lon: 35.83, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Донецьк (Шахеди)", lat: 48.07, lon: 37.72, icon: "🎯", details: "Пусковий район БПЛА", lastActivity: "Запусків не виявлено" },
    { name: "Таганрог (Балістика)", lat: 47.27, lon: 38.75, icon: "🚀", details: "Район пуску ракет", lastActivity: "Активності не виявлено" },
    { name: "Клинці (Балістика)", lat: 52.77, lon: 32.33, icon: "🚀", details: "Район пуску ракет", lastActivity: "Активності не виявлено" },
    { name: "Курськ (Балістика)", lat: 51.76, lon: 36.03, icon: "🚀", details: "Район пуску ракет", lastActivity: "Активності не виявлено" },
    { name: "Джанкой (Балістика)", lat: 45.74, lon: 34.35, icon: "🚀", details: "Район пуску ракет", lastActivity: "Активності не виявлено" },
    { name: "Українка (Ту-95/160)", lat: 51.17, lon: 128.44, icon: "🛫", details: "~37 бортів Ту-95мс/мсм, до 8 бортів Ту-160", lastActivity: "Не зафіксована активність" },
    { name: "Дягілєво (Ту-95мс)", lat: 54.64, lon: 39.56, icon: "🛫", details: "до 1 борта Ту-95мс/мсм", lastActivity: "Не зафіксована активність" }
];

militaryBases.forEach(base => {
    const marker = L.marker([base.lat, base.lon], {
        icon: L.divIcon({
            html: `<div style="font-size: 20px;">${base.icon}</div>`,
            className: 'custom-div-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        })
    })
    .addTo(map)
    .bindTooltip(base.name, { 
        permanent: true, 
        direction: 'top', 
        className: 'base-label' 
    })
    .bindPopup(`
        <div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-width: 200px;">
            <strong style="font-size: 14px; display: block; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 5px;">
                ${base.name}
            </strong>
            <div style="margin-bottom: 4px;">
                <b>Статус/Борти:</b> <br>
                <span style="color: #555;">${base.details}</span>
            </div>
            <div>
                <b>Остання активність:</b> <br>
                <span style="color: #e63946; font-weight: bold;">${base.lastActivity}</span>
            </div>
        </div>
    `);
});
    
    const tilesLight = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 10,
      minZoom: 4,
      attribution: "&copy; OpenStreetMap"
    });

    const tilesDark = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {
        maxZoom: 10,
        minZoom: 4,
        subdomains: "abcd",
        attribution: "&copy; OpenStreetMap, &copy; CartoDB"
      }
    );

    let isDark = true;
    tilesDark.addTo(map);

    const clockEl = document.getElementById("clock");
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleString("uk-UA", {
        timeZone: "Europe/Kyiv",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const themeBtn = document.getElementById("themeToggle");
    themeBtn.onclick = () => {
      if (isDark) {
        map.removeLayer(tilesDark);
        tilesLight.addTo(map);
        isDark = false;
        document.body.classList.remove("dark");
        document.body.classList.add("light");
        themeBtn.textContent = "Темна тема";
      } else {
        map.removeLayer(tilesLight);
        tilesDark.addTo(map);
        isDark = true;
        document.body.classList.remove("light");
        document.body.classList.add("dark");
        themeBtn.textContent = "Світла тема";
      }
      updateRayonStyles();
    };

    // =====================================================
    //  МОДЕЛІ ЛІТАКІВ — залишаю як було, нічого не чіпаю
    // =====================================================

    const MODEL_PNG = {
      x101: "models/x101.png",
      shahed: "models/shahed.png",
      iskander: "models/iskander.png",
      kalibr: "models/kalibr.png"
    };

    const ROT_OFFSET = { x101: -45, shahed: 0, iskander: 0, kalibr: 0 };

    function createMarker(t) {
      const div = document.createElement("div");
      div.style.width = "60px";
      div.style.height = "60px";
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.justifyContent = "center";

      const img = document.createElement("img");
      img.src = MODEL_PNG[t.type] || MODEL_PNG["x101"];
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "contain";
      img.style.transformOrigin = "center";
      img.style.transition = "transform 0.15s linear";

      div.appendChild(img);

      const icon = L.divIcon({
        className: "",
        html: div,
        iconSize: [60, 60],
        iconAnchor: [30, 30]
      });

      const marker = L.marker([t.lat, t.lon], { icon });
      marker._imgRef = img;
      return marker;
    }

    const markers = new Map();

    function update(list) {
      const alive = new Set();

      list.forEach(t => {
        alive.add(t.id);

        let marker = markers.get(t.id);
        if (!marker) {
          marker = createMarker(t);
          marker.addTo(map);
          markers.set(t.id, marker);
        } else {
          marker.setLatLng([t.lat, t.lon]);
        }

        let angle = Math.atan2(t.dy, t.dx) * 180 / Math.PI;
        angle = 90 - angle + (ROT_OFFSET[t.type] || 0);
        marker._imgRef.style.transform = `rotate(${angle}deg)`;
      });

      markers.forEach((m, id) => {
        if (!alive.has(id)) {
          map.removeLayer(m);
          markers.delete(id);
        }
      });
    }

    // =====================================================
    //               Р А Й О Н И   Т А   Т Р И В О Г И
    // =====================================================

    function norm(s) {
      return String(s || "")
        .toLowerCase()
        .replace(/[«»"']/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    let rayonByKey = new Map();
    let activeRayons = new Set();

    fetch("rayony.geojson")
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          style: () => ({
            color: "#666",
            weight: 1,
            fillColor: "#000",
            fillOpacity: 0.05
          }),
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};
            if (!p.rayon) return;

            const key = norm(p.rayon);
            rayonByKey.set(key, layer);

            layer.bindPopup(p.rayon);
          }
        }).addTo(map);

        console.log("Rayons loaded:", rayonByKey.size);
      })
      .catch(err => console.error("GeoJSON load error:", err));

    function updateRayonStyles() {
      rayonByKey.forEach((layer, key) => {
        if (activeRayons.has(key)) {
          layer.setStyle({
            color: "#ff0000",
            weight: 2,
            fillColor: "#ff0000",
            fillOpacity: 0.45
          });
        } else {
          layer.setStyle({
            color: isDark ? "#555" : "#777",
            weight: 1,
            fillColor: isDark ? "#000" : "#fff",
            fillOpacity: 0.05
          });
        }
      });
    }

    function applyAlerts(alertList) {
      activeRayons.clear();

      alertList.forEach(a => {
        if (a.alert_type !== "air_raid") return;
        if (a.location_type !== "raion") return;

        const key = norm(a.location_title);
        if (rayonByKey.has(key)) {
          activeRayons.add(key);
          
          const layer = rayonByKey.get(key);
          // Форматуємо час з поля started_at
          const startTime = a.started_at ? new Date(a.started_at).toLocaleTimeString('uk-UA', {
            hour: '2-digit', 
            minute: '2-digit'
          }) : "--:--";
          
          // Відображаємо час на районі
          layer.unbindTooltip();
          layer.bindTooltip(`Початок: ${startTime}`, {
            permanent: true,
            direction: "center",
            className: "alarm-time-label"
          });
        }
      });

      // Прибираємо написи з районів, де тривога закінчилась
      rayonByKey.forEach((layer, key) => {
        if (!activeRayons.has(key)) {
          layer.unbindTooltip();
        }
      });

      updateRayonStyles();
    }

    // Логіка панелі новин
    const newsBtn = document.getElementById('newsBtn');
    const newsSidebar = document.getElementById('newsSidebar');
    const closeNews = document.getElementById('closeNews');
    const refreshNews = document.getElementById('refreshNews');
    const messagesList = document.getElementById('messagesList');

    // ТУТ ВСТАВ СВІЙ ТОКЕН
    const TG_TOKEN = '8345638273:AAG4X2v4-qE678R1Y7ZhfwzyRZsEmjvHJ7s'; 

    newsBtn.onclick = () => newsSidebar.classList.add('active');
    closeNews.onclick = () => newsSidebar.classList.remove('active');

    refreshNews.onclick = async () => {
        messagesList.innerHTML = '<i>Завантаження...</i>';
        try {
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-50`);
            const data = await response.json();
            if (data.ok) {
                const dayAgo = Math.floor(Date.now() / 1000) - 86400;
                const fresh = data.result.filter(item => {
                    const p = item.channel_post;
                    return p && (p.chat.username === 'shrbua' || p.chat.username === 'shrb_ua') && p.date > dayAgo;
                });
                if (fresh.length === 0) {
                    messagesList.innerHTML = 'Повідомлень за 24г не знайдено. Перевірте, чи бот адмін у каналі.';
                } else {
                    messagesList.innerHTML = '';
                    fresh.reverse().forEach(item => {
                        const p = item.channel_post;
                        const date = new Date(p.date * 1000).toLocaleString('uk-UA');
                        const div = document.createElement('div');
                        div.className = 'msg-item';
                        div.innerHTML = `<div class="msg-date">${date}</div><div>${p.text || '[Медіа/Фото]'}</div>`;
                        messagesList.appendChild(div);
                    });
                }
            } else {
                messagesList.innerHTML = '<span style="color:red">Помилка токена</span>';
            }
        } catch (e) { 
            messagesList.innerHTML = 'Помилка мережі'; 
        }
    };
    
    // =====================================================
    //                 WebSocket
    // =====================================================

    const ws = new WebSocket(
      (location.protocol === "https:" ? "wss://" : "ws://") + location.host
    );

    ws.onopen = () => console.log("WS viewer connected");

    ws.onmessage = e => {
      const d = JSON.parse(e.data);

      if (d.type === "state") update(d.targets);
      if (d.type === "alerts") applyAlerts(d.regions || d.alerts || []);
    };
  </script>
</body>
</html>
