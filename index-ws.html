<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Air Monitor — Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body.dark { background: #050608; color: #eee; }
    body.light { background: #f2f2f2; color: #111; }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #adminBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #2d6cff;
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: 0.15s;
    }

    /* --- НОВІ СТИЛІ ДЛЯ ТЕЛЕГРАМ-ПАНЕЛІ --- */
    #newsBtn {
      position: fixed;
      top: 50px; 
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #0088cc; 
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: 0.15s;
    }
    #newsBtn:hover { background: #0077b5; }

    #newsSidebar {
      position: fixed;
      top: 0;
      right: -350px;
      width: 320px;
      height: 100%;
      background: rgba(20, 22, 26, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
      z-index: 2000;
      transition: 0.3s;
      padding: 20px;
      display: flex;
      flex-direction: column;
      color: #eee;
    }
    body.light #newsSidebar {
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      border-left: 1px solid #ddd;
    }
    #newsSidebar.active { right: 0; }
    
    .msg-item {
      border-bottom: 1px solid #444;
      padding: 10px 0;
      font-size: 14px;
      line-height: 1.4;
    }
    body.light .msg-item { border-bottom: 1px solid #ddd; }
    .msg-date { color: #888; font-size: 11px; margin-bottom: 4px; }
    .channel-link { color: #0088cc; text-decoration: none; font-weight: bold; }
    .channel-link:hover { text-decoration: underline; }
    /* -------------------------------------- */

  </style>
</head>
<body class="dark">

  <div id="map"></div>
  <div id="adminBtn" onclick="location.href='/admin'">Адмін-панель</div>
  
  <button id="newsBtn">Новини ШРБ</button>

  <div id="newsSidebar">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">Стрічка <a href="https://t.me/shrbua" target="_blank" class="channel-link">ШРБ</a></h3>
        <button id="closeNews" style="background:none; border:none; color:inherit; cursor:pointer; font-size: 20px;">✕</button>
    </div>
    <div id="messagesList" style="overflow-y: auto; flex-grow: 1; margin-top: 15px; padding-right: 5px;">
        Натисніть "Оновити", щоб завантажити повідомлення за 24г.
    </div>
    <button id="refreshNews" style="margin-top: 10px; padding: 10px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
        Оновити за 24г
    </button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const isDark = document.body.classList.contains("dark");
    const map = L.map('map', { zoomControl: false }).setView([49.0, 31.0], 6);

    L.tileLayer(isDark 
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    ).addTo(map);

    const rayonByKey = new Map();
    const activeRayons = new Set();

    function norm(s) {
      if (!s) return "";
      return s.toLowerCase().replace(/ район/g, "").trim();
    }

    fetch("/raions.geojson")
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          style: {
            color: isDark ? "#555" : "#777",
            weight: 1,
            fillColor: isDark ? "#000" : "#fff",
            fillOpacity: 0.05
          },
          onEachFeature: (feature, layer) => {
            const name = feature.properties.name || feature.properties.NL_NAME_2;
            if (name) rayonByKey.set(norm(name), layer);
          }
        }).addTo(map);
      })
      .catch(err => console.error("GeoJSON load error:", err));

    function updateRayonStyles() {
      rayonByKey.forEach((layer, key) => {
        if (activeRayons.has(key)) {
          layer.setStyle({
            color: "#ff0000",
            weight: 2,
            fillColor: "#ff0000",
            fillOpacity: 0.45
          });
        } else {
          layer.setStyle({
            color: isDark ? "#555" : "#777",
            weight: 1,
            fillColor: isDark ? "#000" : "#fff",
            fillOpacity: 0.05
          });
        }
      });
    }

    function applyAlerts(alertList) {
      activeRayons.clear();
      alertList.forEach(a => {
        if (a.alert_type !== "air_raid") return;
        if (a.location_type !== "raion") return;
        const key = norm(a.location_title);
        if (rayonByKey.has(key)) activeRayons.add(key);
      });
      updateRayonStyles();
    }

    const ws = new WebSocket(
      (location.protocol === "https:" ? "wss://" : "ws://") + location.host
    );

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === "init" || data.type === "update") {
          applyAlerts(data.alerts);
        }
      } catch(e) {}
    };

    // =====================================================
    //            ЛОГІКА ТЕЛЕГРАМ-ПАНЕЛІ
    // =====================================================
    const newsBtn = document.getElementById('newsBtn');
    const newsSidebar = document.getElementById('newsSidebar');
    const closeNews = document.getElementById('closeNews');
    const refreshNews = document.getElementById('refreshNews');
    const messagesList = document.getElementById('messagesList');

    // ВСТАВ СВІЙ ТОКЕН ТУТ
    const TG_TOKEN = '8624842564:AAHGKcSGVeOJXvbhu_F_cLmZFKNdxWFlLDQ'; 
    const CHAT_ID = '@shrbua';

    function toggleNews() {
        newsSidebar.classList.toggle('active');
    }

    newsBtn.addEventListener('click', toggleNews);
    closeNews.addEventListener('click', toggleNews);

    refreshNews.addEventListener('click', async () => {
        messagesList.innerHTML = '<i>Завантаження повідомлень...</i>';
        
        try {
            // Отримуємо останні події бота (бот має бути адміном в каналі)
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-50`);
            const data = await response.json();

            if (data.ok) {
                const now = Math.floor(Date.now() / 1000);
                const dayAgo = now - 86400;

                // Фільтруємо: тільки пости з каналу shrbua за останні 24 години
                const freshMessages = data.result.filter(item => {
                    const post = item.channel_post;
                    return post && 
                           (post.chat.username === 'shrbua' || post.chat.username === 'shrb_ua') && 
                           post.date > dayAgo;
                });

                if (freshMessages.length === 0) {
                    messagesList.innerHTML = 'Нових повідомлень за останні 24 години не знайдено. <br><br>Переконайтеся, що бот доданий в канал як адмін.';
                } else {
                    messagesList.innerHTML = '';
                    // Нові повідомлення зверху
                    freshMessages.reverse().forEach(item => {
                        const post = item.channel_post;
                        const date = new Date(post.date * 1000).toLocaleString('uk-UA', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        });
                        
                        const div = document.createElement('div');
                        div.className = 'msg-item';
                        div.innerHTML = `
                            <div class="msg-date">${date}</div>
                            <div>${post.text || '<i>[Медіафайл/Фото]</i>'}</div>
                        `;
                        messagesList.appendChild(div);
                    });
                }
            } else {
                messagesList.innerHTML = '<span style="color:#ff4444;">Помилка API. Перевірте токен бота.</span>';
            }
        } catch (err) {
            messagesList.innerHTML = '<span style="color:#ff4444;">Помилка мережі.</span>';
            console.error(err);
        }
    });

  </script>
</body>
</html>
