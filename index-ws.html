<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Air Monitor — Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.dark { background: #050608; color: #eee; }
    body.light { background: #f2f2f2; color: #111; }

    #map {
      width: 100vw;
      height: 100vh;
    }

    /* Верхня панель з годинником та перемикачем */
    #topBar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .glass-panel {
      background: rgba(20, 22, 26, 0.7);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
      font-weight: 600;
    }
    body.light .glass-panel {
      background: rgba(255,255,255,0.8);
      color: #111;
      border: 1px solid rgba(0,0,0,0.1);
    }

    #themeToggle {
      cursor: pointer;
      user-select: none;
    }

    #adminBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #2d6cff;
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: 0.15s;
    }
    #adminBtn:hover { background: #1a51d4; }

    /* --- СТИЛІ ПАНЕЛІ ТЕЛЕГРАМ --- */
    #newsBtn {
      position: fixed;
      top: 50px; 
      right: 10px;
      z-index: 1000;
      padding: 6px 12px;
      background: #0088cc; 
      color: #fff;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: 0.15s;
    }
    #newsSidebar {
      position: fixed;
      top: 0;
      right: -350px;
      width: 320px;
      height: 100%;
      background: rgba(20, 22, 26, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
      z-index: 2000;
      transition: 0.3s;
      padding: 20px;
      display: flex;
      flex-direction: column;
      color: #eee;
    }
    body.light #newsSidebar { background: rgba(255, 255, 255, 0.95); color: #111; border-left: 1px solid #ddd; }
    #newsSidebar.active { right: 0; }
    .msg-item { border-bottom: 1px solid #444; padding: 10px 0; font-size: 14px; }
    body.light .msg-item { border-bottom: 1px solid #ddd; }
    .msg-date { color: #888; font-size: 11px; margin-bottom: 4px; }
    .channel-link { color: #0088cc; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body class="dark">

  <div id="map"></div>

  <div id="topBar">
    <div id="clock" class="glass-panel">00:00:00</div>
    <div id="themeToggle" class="glass-panel">🌙</div>
  </div>

  <div id="adminBtn" onclick="location.href='/admin'">Адмін-панель</div>
  
  <button id="newsBtn">Новини ШРБ</button>
  <div id="newsSidebar">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">Стрічка <a href="https://t.me/shrbua" target="_blank" class="channel-link">ШРБ</a></h3>
        <button id="closeNews" style="background:none; border:none; color:inherit; cursor:pointer; font-size: 20px;">✕</button>
    </div>
    <div id="messagesList" style="overflow-y: auto; flex-grow: 1; margin-top: 15px;">
        Завантажте повідомлення за добу.
    </div>
    <button id="refreshNews" style="margin-top: 10px; padding: 10px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
        Оновити за 24г
    </button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // --- ГОДИННИК ---
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString("uk-UA");
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- ТЕМА ---
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.onclick = () => {
      document.body.classList.toggle("light");
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      themeBtn.innerText = isDark ? "🌙" : "☀️";
      
      tileLayer.setUrl(isDark 
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
      );
    };

    // --- КАРТА ---
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([49.0, 31.0], 6);
    const tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const rayonByKey = new Map();
    const activeRayons = new Set();
    const targetMarkers = new Map();

    function norm(s) {
      if (!s) return "";
      return s.toLowerCase().replace(/ район/g, "").trim();
    }

    fetch("/raions.geojson")
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          style: { color: "#555", weight: 1, fillColor: "#000", fillOpacity: 0.05 },
          onEachFeature: (feature, layer) => {
            const name = feature.properties.name || feature.properties.NL_NAME_2;
            if (name) rayonByKey.set(norm(name), layer);
          }
        }).addTo(map);
      });

    function updateStyles() {
      const isDark = document.body.classList.contains("dark");
      rayonByKey.forEach((layer, key) => {
        if (activeRayons.has(key)) {
          layer.setStyle({ color: "#ff0000", weight: 2, fillColor: "#ff0000", fillOpacity: 0.45 });
        } else {
          layer.setStyle({
            color: isDark ? "#555" : "#777",
            weight: 1,
            fillColor: isDark ? "#000" : "#fff",
            fillOpacity: 0.05
          });
        }
      });
    }

    // --- WEBSOCKET ЛОГІКА (ТРИВОГИ ТА ЦІЛІ) ---
    const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host);

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        // Обробка тривог
        if (data.type === "init" || data.type === "update") {
          activeRayons.clear();
          data.alerts.forEach(a => {
            if (a.alert_type === "air_raid" && a.location_type === "raion") {
              activeRayons.add(norm(a.location_title));
            }
          });
          updateStyles();
        }

        // Обробка цілей
        if (data.type === "init" || data.type === "targets_update") {
          const newTargets = data.targets || [];
          const incomingIds = new Set(newTargets.map(t => t.id));

          targetMarkers.forEach((marker, id) => {
            if (!incomingIds.has(id)) {
              map.removeLayer(marker);
              targetMarkers.delete(id);
            }
          });

          newTargets.forEach(t => {
            if (targetMarkers.has(t.id)) {
              targetMarkers.get(t.id).setLatLng([t.lat, t.lng]);
            } else {
              const m = L.circleMarker([t.lat, t.lng], {
                radius: 8, color: "#fff", weight: 2, fillColor: "#ffea00", fillOpacity: 1
              }).addTo(map);
              m.bindTooltip(t.type || "Ціль", { permanent: true, direction: "top" });
              targetMarkers.set(t.id, m);
            }
          });
        }
      } catch(e) {}
    };

    // =====================================================
    //            ДОДАТКОВА ЛОГІКА ПАНЕЛІ ШРБ
    // =====================================================
    const newsBtn = document.getElementById('newsBtn');
    const newsSidebar = document.getElementById('newsSidebar');
    const closeNews = document.getElementById('closeNews');
    const refreshNews = document.getElementById('refreshNews');
    const messagesList = document.getElementById('messagesList');

    // ВСТАВ СВІЙ ТОКЕН НИЖЧЕ
    const TG_TOKEN = '8624842564:AAHGKcSGVeOJXvbhu_F_cLmZFKNdxWFlLDQ'; 
    const CHAT_ID = '@shrbua';

    newsBtn.onclick = () => newsSidebar.classList.add('active');
    closeNews.onclick = () => newsSidebar.classList.remove('active');

    refreshNews.onclick = async () => {
        messagesList.innerHTML = '<i>Завантаження...</i>';
        try {
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-50`);
            const data = await response.json();
            if (data.ok) {
                const dayAgo = Math.floor(Date.now() / 1000) - 86400;
                const fresh = data.result.filter(item => {
                    const p = item.channel_post;
                    return p && p.chat.username === 'shrbua' && p.date > dayAgo;
                });
                if (fresh.length === 0) {
                    messagesList.innerHTML = 'Повідомлень за 24г не знайдено.';
                } else {
                    messagesList.innerHTML = '';
                    fresh.reverse().forEach(item => {
                        const p = item.channel_post;
                        const date = new Date(p.date * 1000).toLocaleString('uk-UA');
                        const div = document.createElement('div');
                        div.className = 'msg-item';
                        div.innerHTML = `<div class="msg-date">${date}</div><div>${p.text || '[Медіа]'}</div>`;
                        messagesList.appendChild(div);
                    });
                }
            }
        } catch (e) { messagesList.innerHTML = 'Помилка завантаження.'; }
    };
  </script>
</body>
</html>
